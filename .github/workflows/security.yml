name: Security Scan

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"

jobs:
  pip-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit -r app/requirements.txt
